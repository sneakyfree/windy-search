name: canonical-domains-lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run canonical-domains lint
        run: bash .github/lint/lint-canonical-domains.sh --config .github/lint/canonical-domains.json .
